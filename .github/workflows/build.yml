name: Build

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Checkout builds branch
        uses: actions/checkout@v4
        with:
          ref: "builds"
          path: "builds"

      - name: Read always_build.json
        id: folders
        run: |
          cd $GITHUB_WORKSPACE/src
          FOLDERS=$(jq -r '.[]' .github/always_build.json | tr '\n' ' ')
          echo "Folder yang akan dibuild: $FOLDERS"
          echo "folders=$FOLDERS" >> $GITHUB_OUTPUT

      - name: Clean old .cs3 files (hanya folder yang bersangkutan)
        run: |
          cd $GITHUB_WORKSPACE/builds
          for f in ${{ steps.folders.outputs.folders }}; do
            rm -f "$f"/*.cs3 || true
          done

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "adopt"
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make makePluginsJson
          for f in ${{ steps.folders.outputs.folders }}; do
            mkdir -p "$GITHUB_WORKSPACE/builds/$f"
            cp "$f"/build/*.cs3 "$GITHUB_WORKSPACE/builds/$f/"
          done
          cp build/plugins.json $GITHUB_WORKSPACE/builds

      - name: Push to builds branch
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit -m "Build $GITHUB_SHA" || exit 0
          git push